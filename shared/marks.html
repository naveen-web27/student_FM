<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Marks · SkoolMark</title>
<link rel="stylesheet" href="../assets/css/style.css?v=3" />
</head>
<body>
<script src="../assets/js/config.js?v=3"></script>
<script src="../assets/js/api.js?v=3"></script>
<script src="../assets/js/auth.js?v=3"></script>
<script src="../assets/js/ui.js?v=3"></script>

<div class="app">
  <div class="card">
    <div class="row">
      <select id="child"></select>
    </div>
  </div>

  <div class="card" id="entry" style="display:none">
    <h2>Add marks</h2>
    <form id="f" class="row">
      <input name="subject" placeholder="Subject" required />
      <input name="marks" placeholder="Marks" type="number" required />
      <input name="max_marks" placeholder="Out of" type="number" value="100" />
      <input name="term" placeholder="Term (e.g. T1)" />
      <button type="submit">Save</button>
    </form>
  </div>

  <div class="card">
    <h2>Marksheet</h2>
    <div id="list" class="muted">—</div>
  </div>
</div>

<script>
const me = SkoolAuth.require(["admin","teacher","parent","student"]);
SkoolUI.topbar("Marks");

const childSel = document.getElementById("child");
async function init() {
  let kids = [];
  if (me.role === "parent") kids = (await SkoolAPI.api("students.byParent", {})).students;
  else if (me.role === "student") kids = [{ student_id: me.linked_id, name: me.name }];
  else kids = ((await SkoolAPI.api("students.list", {})).students || []).slice(0, 50);
  kids.forEach(k => childSel.appendChild(new Option(k.name + (k.class ? " · " + k.class + "-" + k.section : ""), k.student_id)));
  childSel.onchange = load;
  if (me.role === "admin" || me.role === "teacher") document.getElementById("entry").style.display = "";
  if (kids.length) load();
}
async function load() {
  const sid = childSel.value;
  try {
    const d = await SkoolAPI.api("marks.byStudent", { student_id: sid });
    const list = document.getElementById("list");
    if (!d.marks.length) { list.textContent = "No marks yet."; return; }
    let total = 0, max = 0;
    list.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr><th align="left">Subject</th><th>Marks</th><th>Out of</th><th>Term</th></tr></thead>
      <tbody>${d.marks.map(m => { total += Number(m.marks||0); max += Number(m.max_marks||0); return `
        <tr style="border-top:1px solid #eef2f7">
          <td style="padding:6px 0">${SkoolUI.esc(m.subject)}</td>
          <td align="center">${SkoolUI.esc(m.marks)}</td>
          <td align="center">${SkoolUI.esc(m.max_marks)}</td>
          <td align="center">${SkoolUI.esc(m.term||"")}</td>
        </tr>`; }).join("")}</tbody>
      <tfoot><tr><th align="left">Total</th><th align="center">${total}</th><th align="center">${max}</th>
        <th align="center">${max ? Math.round(total/max*1000)/10 + "%" : ""}</th></tr></tfoot></table>`;
  } catch (e) { document.getElementById("list").textContent = "Failed: " + e.message; }
}
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target); const m = { student_id: childSel.value };
  fd.forEach((v, k) => { if (v) m[k] = v; });
  try { await SkoolAPI.api("marks.upsert", { mark: m }); SkoolUI.toast("Saved","ok"); e.target.reset(); load(); }
  catch (err) { SkoolUI.toast("Failed: " + err.message, "err"); }
});
init();
</script>
</body>
</html>
