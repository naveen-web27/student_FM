<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://script.google.com 'unsafe-inline'; connect-src 'self' https://script.google.com https://*.googleusercontent.com https://*.google.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-src https://script.google.com" />
<title>Login · SkoolMark</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div class="app narrow">
  <div style="text-align:center;margin:30px 0 20px">
    <div style="font-size:42px">📘</div>
    <h1 style="margin:6px 0 2px" id="schoolName">SkoolMark</h1>
    <div class="muted">School Facility Management</div>
  </div>

  <form class="card" id="loginForm" autocomplete="on">
    <h2>Sign in</h2>
    <div class="muted" style="margin-bottom:10px">Use the credentials given by your school admin.</div>
    <label class="muted" for="u">Username</label>
    <input id="u" name="username" required autocomplete="username" />
    <div style="height:10px"></div>
    <label class="muted" for="p">Password</label>
    <input id="p" name="password" type="password" required autocomplete="current-password" />
    <div style="height:14px"></div>
    <button type="submit" id="btn">Sign in</button>
    <div class="muted" id="err" style="color:#dc2626;margin-top:10px"></div>
  </form>

  <div class="muted" style="text-align:center;margin-top:20px;font-size:13px">
    Secure: HTTPS · audit-logged · per-school data isolation
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/ui.js"></script>
<script>
document.getElementById("schoolName").textContent = window.SKOOL_CONFIG.SCHOOL_NAME;

// already logged in? go to dashboard
if (SkoolAPI.getToken() && SkoolAPI.getUser()) location.href = "dashboard.html";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  err.textContent = "";
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    const data = await SkoolAPI.api("auth.login", {
      username: document.getElementById("u").value.trim(),
      password: document.getElementById("p").value
    });
    SkoolAPI.setSession(data.token, data.user);
    location.href = "dashboard.html";
  } catch (e) {
    err.textContent =
      e.message === "INVALID_CREDENTIALS" ? "Wrong username or password." :
      e.message === "LOCKED" ? "Account locked. Try again in 15 minutes." :
      e.message === "NETWORK" ? "Network error. Please check internet." :
      "Unable to sign in. " + e.message;
  } finally {
    btn.disabled = false; btn.textContent = "Sign in";
  }
});
</script>
</body>
</html>
