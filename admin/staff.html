<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Staff · SkoolMark</title>
<link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/ui.js"></script>

<div class="app">
  <div class="card">
    <h2 id="formTitle">Add Staff</h2>
    <form id="f" autocomplete="off">
      <input type="hidden" name="staff_id" />
      <div class="row">
        <input name="name" placeholder="Name" required />
        <input name="role" placeholder="Role (teacher / accountant)" />
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <input name="subject" placeholder="Subject" />
        <input name="phone" placeholder="Phone" />
        <input name="email" placeholder="Email" />
      </div>
      <div style="height:14px"></div>
      <div class="muted" style="font-size:13px">Login (optional — leave blank when editing if already created)</div>
      <div style="height:6px"></div>
      <div class="row">
        <input name="username" placeholder="Login username" autocomplete="off" />
        <input name="password" type="text" placeholder="Initial password" autocomplete="new-password" />
      </div>
      <div style="height:8px"></div>
      <div class="muted" style="font-size:13px">Class teacher of (optional)</div>
      <div style="height:6px"></div>
      <div class="row">
        <input name="class" placeholder="Class (e.g. 5)" />
        <input name="section" placeholder="Section (e.g. B)" />
      </div>
      <div style="height:12px"></div>
      <div class="row">
        <button type="submit" id="saveBtn">Save</button>
        <button type="button" id="cancelBtn" class="secondary" style="display:none">Cancel edit</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>Staff list</h2>
    <div id="list" class="muted">Loading…</div>
  </div>
</div>

<script>
SkoolAuth.require(["admin"]);
SkoolUI.topbar("Staff");

var listEl = document.getElementById("list");
var form = document.getElementById("f");
var saveBtn = document.getElementById("saveBtn");
var cancelBtn = document.getElementById("cancelBtn");
var formTitle = document.getElementById("formTitle");
var DATA = [];
var inFlight = false;

function setVal(name, val) {
  var el = form.elements[name];
  if (el) el.value = (val == null ? "" : val);
}

async function load() {
  try {
    var d = await SkoolAPI.api("staff.list", {});
    DATA = d.staff || [];
    render();
  } catch (e) { listEl.textContent = "Failed: " + e.message; }
}

function render() {
  if (!DATA.length) { listEl.textContent = "No staff yet."; return; }
  var html = '<div class="tbl-wrap"><table class="tbl">';
  html += '<thead><tr><th>Name</th><th>Role</th><th>Subject</th><th>Class</th><th>Login</th><th>Phone</th><th></th></tr></thead><tbody>';
  for (var i = 0; i < DATA.length; i++) {
    var s = DATA[i];
    var cls = (s.class && s.section) ? (SkoolUI.esc(s.class) + "-" + SkoolUI.esc(s.section)) : "";
    html += '<tr>'
      + '<td data-l="Name"><strong>' + SkoolUI.esc(s.name) + '</strong></td>'
      + '<td data-l="Role">' + SkoolUI.esc(s.role || "") + '</td>'
      + '<td data-l="Subject">' + SkoolUI.esc(s.subject || "") + '</td>'
      + '<td data-l="Class">' + cls + '</td>'
      + '<td data-l="Login">' + SkoolUI.esc(s.username || "") + '</td>'
      + '<td data-l="Phone">' + SkoolUI.esc(s.phone || "") + '</td>'
      + '<td class="row-actions">'
        + '<button type="button" class="secondary" data-edit="' + SkoolUI.esc(s.staff_id) + '">Edit</button> '
        + '<button type="button" class="danger" data-del="' + SkoolUI.esc(s.staff_id) + '">Delete</button>'
      + '</td></tr>';
  }
  html += '</tbody></table></div>';
  listEl.innerHTML = html;
}

listEl.addEventListener("click", async function (e) {
  var t = e.target.closest ? e.target.closest("button") : e.target;
  if (!t) return;
  var ed = t.getAttribute && t.getAttribute("data-edit");
  var dl = t.getAttribute && t.getAttribute("data-del");
  if (ed) {
    var s = DATA.find(function (x) { return String(x.staff_id) === String(ed); });
    if (!s) return;
    setVal("staff_id", s.staff_id);
    setVal("name",     s.name);
    setVal("role",     s.role);
    setVal("subject",  s.subject);
    setVal("phone",    s.phone);
    setVal("email",    s.email);
    setVal("username", "");
    setVal("password", "");
    setVal("class",    s.class);
    setVal("section",  s.section);
    formTitle.textContent = "Edit Staff — " + s.name;
    cancelBtn.style.display = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else if (dl) {
    var s2 = DATA.find(function (x) { return String(x.staff_id) === String(dl); });
    if (!s2) return;
    if (!confirm('Delete staff "' + s2.name + '"? This also removes their login.')) return;
    try {
      await SkoolAPI.api("staff.delete", { staff_id: s2.staff_id });
      SkoolUI.toast("Deleted", "ok"); load();
    } catch (err) { SkoolUI.toast("Failed: " + err.message, "err"); }
  }
});

cancelBtn.onclick = resetForm;
function resetForm() {
  form.reset();
  setVal("staff_id", "");
  formTitle.textContent = "Add Staff";
  cancelBtn.style.display = "none";
}

form.addEventListener("submit", async function (e) {
  e.preventDefault();
  if (inFlight) return;
  inFlight = true;
  saveBtn.disabled = true;
  var oldText = saveBtn.textContent;
  saveBtn.textContent = "Saving…";

  var fd = new FormData(form);
  var staff = {};
  var extras = { username: "", password: "", "class": "", section: "" };
  fd.forEach(function (v, k) {
    if (k in extras) { if (v) extras[k] = v; return; }
    if (v === "" || v == null) return;
    staff[k] = v;
  });

  try {
    await SkoolAPI.api("staff.upsert", Object.assign({ staff: staff }, extras));
    SkoolUI.toast(extras.username ? "Saved + login created" : "Saved", "ok");
    resetForm();
    await load();
  } catch (err) {
    SkoolUI.toast("Failed: " + err.message, "err");
  } finally {
    inFlight = false;
    saveBtn.disabled = false;
    saveBtn.textContent = oldText;
  }
});
load();
</script>
</body>
</html>
