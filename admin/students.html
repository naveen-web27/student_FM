<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Students · SkoolMark</title>
<link rel="stylesheet" href="../assets/css/style.css?v=3" />
</head>
<body>
<script src="../assets/js/config.js?v=3"></script>
<script src="../assets/js/api.js?v=3"></script>
<script src="../assets/js/auth.js?v=3"></script>
<script src="../assets/js/ui.js?v=3"></script>

<div class="app">
  <div class="card">
    <h2 id="formTitle">Add Student</h2>
    <form id="f" autocomplete="off">
      <input type="hidden" name="student_id" />
      <div class="row">
        <input name="name" placeholder="Full name" required />
        <input name="roll_no" placeholder="Roll no" required />
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <input name="class" placeholder="Class (e.g. 5)" required />
        <input name="section" placeholder="Section (e.g. B)" required />
        <input name="dob" placeholder="DOB YYYY-MM-DD" />
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <input name="parent_name" placeholder="Parent name" />
        <input name="parent_phone" placeholder="Parent phone" />
      </div>
      <div style="height:8px"></div>
      <div class="muted" style="font-size:13px">Parent login (optional — leave blank when editing if already created)</div>
      <div style="height:6px"></div>
      <div class="row">
        <input name="parent_username" placeholder="Parent login username" autocomplete="off" />
        <input name="parent_password" type="text" placeholder="Initial password" autocomplete="new-password" />
      </div>
      <div style="height:8px"></div>
      <input name="parent_user_id" placeholder="Existing parent user_id (optional)" />
      <div style="height:8px"></div>
      <input name="photo_url" placeholder="Photo URL (Drive / public)" />
      <div style="height:12px"></div>
      <div class="row">
        <button type="submit" id="saveBtn">Save</button>
        <button type="button" id="cancelBtn" class="secondary" style="display:none">Cancel edit</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="row" style="align-items:center">
      <h2 style="flex:1;min-width:0">Students</h2>
      <input id="q" placeholder="Search…" style="max-width:240px" />
    </div>
    <div id="list" class="muted">Loading…</div>
  </div>
</div>

<script>
SkoolAuth.require(["admin"]);
SkoolUI.topbar("Students");

var listEl = document.getElementById("list");
var form = document.getElementById("f");
var saveBtn = document.getElementById("saveBtn");
var cancelBtn = document.getElementById("cancelBtn");
var formTitle = document.getElementById("formTitle");
var DATA = [];
var inFlight = false;

// Safe setter — form.name / form.action etc. shadow inputs of the same name,
// so always go through .elements[].
function setVal(name, val) {
  var el = form.elements[name];
  if (el) el.value = (val == null ? "" : val);
}

async function load() {
  try {
    var d = await SkoolAPI.api("students.list", {});
    DATA = d.students || [];
    render();
  } catch (e) { listEl.textContent = "Failed: " + e.message; }
}

function render() {
  var q = document.getElementById("q").value.toLowerCase();
  var rows = DATA.filter(function (s) {
    return !q || (s.name + " " + s.class + " " + s.section + " " + s.roll_no).toLowerCase().indexOf(q) >= 0;
  });
  if (!rows.length) { listEl.textContent = "No students."; return; }
  var html = '<div class="tbl-wrap"><table class="tbl">';
  html += '<thead><tr><th>Name</th><th>Class</th><th>Roll</th><th>Parent</th><th></th></tr></thead><tbody>';
  for (var i = 0; i < rows.length; i++) {
    var s = rows[i];
    html += '<tr>'
      + '<td data-l="Name"><strong>' + SkoolUI.esc(s.name) + '</strong></td>'
      + '<td data-l="Class">' + SkoolUI.esc(s.class) + '-' + SkoolUI.esc(s.section) + '</td>'
      + '<td data-l="Roll">' + SkoolUI.esc(s.roll_no) + '</td>'
      + '<td data-l="Parent">' + SkoolUI.esc(s.parent_name || "") + ' ' + SkoolUI.esc(s.parent_phone || "") + '</td>'
      + '<td class="row-actions">'
        + '<button type="button" class="secondary" data-edit="' + SkoolUI.esc(s.student_id) + '">Edit</button> '
        + '<button type="button" class="danger" data-del="' + SkoolUI.esc(s.student_id) + '">Delete</button>'
      + '</td></tr>';
  }
  html += '</tbody></table></div>';
  listEl.innerHTML = html;
}

document.getElementById("q").oninput = render;

listEl.addEventListener("click", async function (e) {
  var t = e.target.closest ? e.target.closest("button") : e.target;
  if (!t) return;
  var ed = t.getAttribute && t.getAttribute("data-edit");
  var dl = t.getAttribute && t.getAttribute("data-del");
  if (ed) {
    var s = DATA.find(function (x) { return String(x.student_id) === String(ed); });
    if (!s) return;
    setVal("student_id",     s.student_id);
    setVal("name",           s.name);
    setVal("roll_no",        s.roll_no);
    setVal("class",          s.class);
    setVal("section",        s.section);
    setVal("dob",            s.dob);
    setVal("parent_name",    s.parent_name);
    setVal("parent_phone",   s.parent_phone);
    setVal("parent_user_id", s.parent_user_id);
    setVal("parent_username","");
    setVal("parent_password","");
    setVal("photo_url",      s.photo_url);
    formTitle.textContent = "Edit Student — " + s.name;
    cancelBtn.style.display = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else if (dl) {
    var s2 = DATA.find(function (x) { return String(x.student_id) === String(dl); });
    if (!s2) return;
    if (!confirm('Delete student "' + s2.name + '" (Class ' + s2.class + '-' + s2.section + ', Roll ' + s2.roll_no + ')?')) return;
    try {
      await SkoolAPI.api("students.delete", { student_id: s2.student_id });
      SkoolUI.toast("Deleted", "ok"); load();
    } catch (err) { SkoolUI.toast("Failed: " + err.message, "err"); }
  }
});

cancelBtn.onclick = resetForm;
function resetForm() {
  form.reset();
  setVal("student_id", "");
  formTitle.textContent = "Add Student";
  cancelBtn.style.display = "none";
}

form.addEventListener("submit", async function (e) {
  e.preventDefault();
  if (inFlight) return;
  inFlight = true;
  saveBtn.disabled = true;
  var oldText = saveBtn.textContent;
  saveBtn.textContent = "Saving…";

  var fd = new FormData(form);
  var student = {};
  var extras = { parent_username: "", parent_password: "" };
  // Always include student_id (even if empty) so backend can tell update vs new.
  fd.forEach(function (v, k) {
    if (k in extras) { if (v) extras[k] = v; return; }
    if (v === "" || v == null) return;
    student[k] = v;
  });

  try {
    await SkoolAPI.api("students.upsert", Object.assign({ student: student }, extras));
    SkoolUI.toast(extras.parent_username ? "Saved + parent login created" : "Saved", "ok");
    resetForm();
    await load();
  } catch (err) {
    SkoolUI.toast("Failed: " + err.message, "err");
  } finally {
    inFlight = false;
    saveBtn.disabled = false;
    saveBtn.textContent = oldText;
  }
});
load();
</script>
</body>
</html>
